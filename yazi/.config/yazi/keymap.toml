[input]

# 手动修改的输入内容的vim模式的键位
prepend_keymap = [
	# Mode
	{ on = [ "k" ], run = "insert",                              desc = "进入插入模式" },
	{ on = [ "K" ], run = [ "move -999", "insert" ],             desc = "移动到行首并进入插入模式" },
	# Character-wise movement
	{ on = [ "n" ],       run = "move -1", desc = "向左移动一个字符" },
	{ on = [ "i" ],       run = "move 1",  desc = "向右移动一个字符" },
	# Line-wise movement
	{ on = [ "N" ],      run = "move -999", desc = "移动到行首" },
	{ on = [ "I" ],      run = "move 999",  desc = "移动到行尾" },

	# Undo/Redo
	{ on = [ "l" ],     run = "undo", desc = "撤销上一次操作" },
	{ on = [ "L" ], run = "redo", desc = "重做上一次操作" },
]

keymap = [
	{ on = "<C-c>",   run = "close",          desc = "取消输入" },
	{ on = "<Enter>", run = "close --submit", desc = "提交输入" },
	{ on = "<Esc>",   run = "escape",         desc = "返回普通模式或取消输入" },
	{ on = "<C-[>",   run = "escape",         desc = "返回普通模式或取消输入" },

	# Mode
	{ on = "i", run = "insert",                          desc = "进入插入模式" },
	{ on = "I", run = [ "move first-char", "insert" ],   desc = "移动到行首非空白字符并进入插入模式" },
	{ on = "a", run = "insert --append",                 desc = "进入追加模式" },
	{ on = "A", run = [ "move eol", "insert --append" ], desc = "移动到行尾并进入追加模式" },
	{ on = "v", run = "visual",                          desc = "进入可视模式" },
	{ on = "r", run = "replace",                         desc = "替换单个字符" },

	# Selection
	{ on = "V",     run = [ "move bol", "visual", "move eol" ], desc = "从行首选择到行尾" },
	{ on = "<C-A>", run = [ "move eol", "visual", "move bol" ], desc = "从行尾选择到行首" },
	{ on = "<C-E>", run = [ "move bol", "visual", "move eol" ], desc = "从行首选择到行尾" },

	# Character-wise movement
	{ on = "h",       run = "move -1", desc = "向左移动一个字符" },
	{ on = "l",       run = "move 1",  desc = "向右移动一个字符" },
	{ on = "<Left>",  run = "move -1", desc = "向左移动一个字符" },
	{ on = "<Right>", run = "move 1",  desc = "向右移动一个字符" },
	{ on = "<C-b>",   run = "move -1", desc = "向左移动一个字符" },
	{ on = "<C-f>",   run = "move 1",  desc = "向右移动一个字符" },

	# Word-wise movement
	{ on = "b",     run = "backward",                    desc = "向左跳到当前或上一个单词开头" },
	{ on = "B",     run = "backward --far",              desc = "向左跳到当前或上一个 WORD 开头" },
	{ on = "w",     run = "forward",                     desc = "向右跳到下一个单词开头" },
	{ on = "W",     run = "forward --far",               desc = "向右跳到下一个 WORD 开头" },
	{ on = "e",     run = "forward --end-of-word",       desc = "向右跳到当前或下一个单词结尾" },
	{ on = "E",     run = "forward --far --end-of-word", desc = "向右跳到当前或下一个 WORD 结尾" },
	{ on = "<A-b>", run = "backward",                    desc = "向左跳到当前或上一个单词开头" },
	{ on = "<A-f>", run = "forward --end-of-word",       desc = "向右跳到当前或下一个单词结尾" },

	# Line-wise movement
	{ on = "0",      run = "move bol",        desc = "移动到行首" },
	{ on = "$",      run = "move eol",        desc = "移动到行尾" },
	{ on = "_",      run = "move first-char", desc = "移动到行首第一个非空白字符" },
	{ on = "^",      run = "move first-char", desc = "移动到行首第一个非空白字符" },
	{ on = "<C-a>",  run = "move bol",        desc = "移动到行首" },
	{ on = "<C-e>",  run = "move eol",        desc = "移动到行尾" },
	{ on = "<Home>", run = "move bol",        desc = "移动到行首" },
	{ on = "<End>",  run = "move eol",        desc = "移动到行尾" },

	# Delete
	{ on = "<Backspace>", run = "backspace",         desc = "删除光标前的字符" },
	{ on = "<Delete>",    run = "backspace --under", desc = "删除光标下的字符" },
	{ on = "<C-h>",       run = "backspace",         desc = "删除光标前的字符" },
	# { on = "<C-d>",       run = "backspace --under", desc = "删除光标下的字符" },

	# Kill
	{ on = "<C-u>", run = "kill bol",      desc = "删除从光标到行首的内容" },
	{ on = "<C-k>", run = "kill eol",      desc = "删除从光标到行尾的内容" },
	{ on = "<C-w>", run = "kill backward", desc = "删除从光标到当前单词开头的内容" },
	{ on = "<A-d>", run = "kill forward",  desc = "删除从光标到当前单词结尾的内容" },

	# Cut/Yank/Paste
	{ on = "d", run = "delete --cut",                              desc = "剪切选中字符" },
	{ on = "D", run = [ "delete --cut", "move eol" ],              desc = "剪切到行尾" },
	{ on = "c", run = "delete --cut --insert",                     desc = "剪切选中字符并进入插入模式" },
	{ on = "C", run = [ "delete --cut --insert", "move eol" ],     desc = "剪切到行尾并进入插入模式" },
	{ on = "x", run = [ "delete --cut", "move 1 --in-operating" ], desc = "剪切当前字符" },
	{ on = "y", run = "yank",                                      desc = "复制选中字符" },
	{ on = "p", run = "paste",                                     desc = "在光标后粘贴" },
	{ on = "P", run = "paste --before",                            desc = "在光标前粘贴" },

	# Undo/Redo
	{ on = "u",     run = "undo", desc = "撤销上一次操作" },
	{ on = "<C-r>", run = "redo", desc = "重做上一次操作" },

	# Help
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]

