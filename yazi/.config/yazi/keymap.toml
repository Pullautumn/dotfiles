# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
# "$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[mgr]

# 手动添加或更改过的键位
prepend_keymap = [
	# Plugin
	# 挂载文件系统
	{ on = [ "m","M" ], run = "plugin mount", desc = "挂载文件系统" },
	# 智能进入目录或打开文件
	{ on = [ "i" ], run = "plugin smart-enter", desc = "进入子目录，或打开文件" },
	{ on = [ "<Right>" ], run = "plugin smart-enter", desc = "进入子目录，或打开文件" },
	{ on = [ "<Enter>" ], run = "plugin smart-enter", desc = "进入子目录，或打开文件" },
	# dragon-drop拖动文件
	{ on = [ "<C-n>" ], run = 'shell -- dragon-drop -x -i -T "$1"', desc = "运行 shell 命令（阻塞 UI 直到命令完成）" },
	# 预览最大化
	{ on = [ "F" ], run = "plugin --sync max-preview", desc = "预览最大化" },
	# 隐藏预览
	{ on = [ "z","m" ], run = "plugin --sync hide-preview", desc = "隐藏预览" },
	# 使用ouch压缩
	{ on = [ "C" ], run = "plugin ouch --args=zip", desc = "使用 ouch 压缩" },
	# 更改文件权限chmod.yazi
	{ on = [ "c","m" ], run = "plugin chmod", desc = "修改选中文件的权限" },
	# 比较文件diff.yazi
	# { on = [ "<C-d>" ], run = "plugin diff", desc = "比较选中文件与悬停文件" },
	# sudo touch/mkdir
	{ on = [ "R", "T" ], run = "plugin sudo --args='create'", desc = "sudo 创建文件或目录（以 / 结尾表示目录）" },
	# sudo rename
	{ on = [ "R", "c", "w" ], run = "plugin sudo --args='rename'", desc = "sudo 重命名" },
	# sudo paste
	{ on = [ "R", "p", "p" ], run = "plugin sudo --args='paste'", desc = "sudo 粘贴" },
	{ on = [ "R", "p", "o" ], run = "plugin sudo --args='paste -f'", desc = "sudo 粘贴文件（若目标存在则覆盖）" },
	{ on = [ "R", "p", "l" ], run = "plugin sudo --args='link'", desc = "sudo 创建硬链接" },
	{ on = [ "R", "p", "L" ], run = "plugin sudo --args='link -r'", desc = "sudo 创建相对路径的符号链接" },
	# sudo delete
	{ on = [ "R", "d", "D" ], run = [ "plugin sudo --args='remove'" ], desc = "sudo 将文件移至回收站" },
	{ on = [ "R", "D" ], run = [ "plugin sudo --args='remove -P'" ], desc = "永久删除文件" },

	# Esc
	{ on = [ "<Esc>" ], run = "escape",             desc = "退出可视模式、清除选中或取消搜索" },
	{ on = [ "S" ],     run = 'shell "$SHELL" --block --confirm',               desc = "退出进程" },
	{ on = [ "<C-z>" ], run = "suspend",            desc = "挂起进程" },

	# Navigation
	{ on = [ "u" ], run = "arrow -1", desc = "光标上移" },
	{ on = [ "e" ], run = "arrow 1",  desc = "光标下移" },

	{ on = [ "U" ], run = "arrow -5", desc = "光标上移 5 行" },
	{ on = [ "E" ], run = "arrow 5",  desc = "光标下移 5 行" },

	{ on = [ "<C-u>" ], run = "arrow -50%",  desc = "光标上移半页" },
	{ on = [ "<C-e>" ], run = "arrow 50%",   desc = "光标下移半页" },
	{ on = [ "n" ], run = [ "leave", "escape --visual --select" ], desc = "返回上级目录" },

	# Selection
	{ on = [ "v" ],       run = "toggle_all --state=none",                         desc = "反向选择" },

	# Operation
	{ on = [ "o" ],         run = "open --interactive",                                   desc = "交互式打开选中文件" },

	# Copy
	{ on = [ "y", "y" ], run = [ "yank", "escape --visual --select",
		'''
    shell --confirm '
        uris=$(for path in "$@"; do echo "file://$path"; done);
        if [ "$XDG_SESSION_TYPE" = "wayland" ]; then
            echo -n "$uris" | wl-copy -t text/uri-list;
        else
            echo -n "$uris" | xclip -i -selection clipboard -t text/uri-list;
        fi
    '
		'''
		], desc = "复制文件并复制到系统剪贴板" },
	{ on = [ "y", "p" ], run = "copy path",             desc = "复制绝对路径" },
	{ on = [ "y", "d" ], run = "copy dirname",          desc = "复制目录路径" },
	{ on = [ "y", "n" ], run = "copy filename",         desc = "复制文件名" },
	{ on = [ "y", "." ], run = "copy name_without_ext", desc = "复制不含扩展名的文件名" },

	# Cut
	{ on = [ "x" ],         run = [ "yank --cut", "escape --visual --select" ],           desc = "剪切选中文件" },
	{ on = [ "d", "d" ],         run = [ "yank --cut", "escape --visual --select" ],           desc = "剪切选中文件" },

	# Paste
	{ on = [ "p", "p" ],         run = "paste",                                           desc = "粘贴文件" },
	{ on = [ "p", "o" ],         run = "paste --force",                                   desc = "粘贴文件（若目标存在则覆盖）" },
	{ on = [ "p", "l" ],         run = "link",                                            desc = "创建绝对路径的符号链接" },
	{ on = [ "p", "L" ],         run = "link --relative",                                 desc = "创建相对路径的符号链接" },

	# Delete
	{ on = [ "d", "D" ],    run = [ "remove", "escape --visual --select" ],               desc = "将文件移至回收站" },
	{ on = [ "D" ],         run = [ "remove --permanently", "escape --visual --select" ], desc = "永久删除文件" },

	# Create
	{ on = [ "M" ],         run = "shell --interactive 'mkdir -p '",                         desc = "创建目录" },
	{ on = [ "T" ],         run = "create",                                               desc = "创建文件或目录（以 / 结尾表示目录）" },

	# Rename
	{ on = [ "k" ],         run = "rename --cursor=before_ext",                           desc = "重命名文件或目录" },
	{ on = [ "A" ],         run = "rename",                           desc = "重命名文件或目录" },
	{ on = [ "c", "w" ],    run = "rename",                           desc = "重命名文件或目录" },
	{ on = [ "c", "b" ],    run = "rename",                           desc = "重命名文件或目录" },

	# Lazygit
	{ on = [ "<C-g>" ], run = "shell --block --confirm 'lazygit'", desc = "运行 shell 命令（阻塞 UI 直到命令完成）" },


	# Hidden
	{ on = [ "." ],         run = "hidden toggle",                                        desc = "切换隐藏文件的可见性" },
	{ on = [ "z", "h" ],    run = "hidden toggle",                                        desc = "切换隐藏文件的可见性" },

	# Search
	{ on = [ "<C-f>" ],         run = "plugin skim-rg", desc = "通过 ripgrep 和 skim 按内容搜索文件，并用 neovim 打开" },
	{ on = [ "<C-t>" ],         run = "plugin skim",    desc = "通过 skim 跳转到文件" },

	# Find
	{ on = [ "=" ], run = "find_arrow",              desc = "跳转到下一个匹配文件" },
	{ on = [ "-" ], run = "find_arrow --previous",   desc = "跳转到上一个匹配文件" },

	# Tabs
	{ on = [ "t","u" ], run = "tab_create --current", desc = "使用当前路径创建新标签页" },
	{ on = [ "t","n" ], run = "tab_switch -1 --relative", desc = "切换到上一个标签页" },
	{ on = [ "t","i" ], run = "tab_switch 1 --relative",  desc = "切换到下一个标签页" },
	{ on = [ "t","q" ], run = "close",              desc = "关闭当前标签页，若为最后一个则退出" },

	# Goto
	{ on = [ "g", "/" ],       run = "cd /",   desc = "跳转到根目录" },
	{ on = [ "g", "h" ],       run = "cd ~",   desc = "跳转到用户目录" },
	{ on = [ "g", "d" ],       run = "cd ~/Downloads", desc = "跳转到下载目录" },
	{ on = [ "g", "t" ],       run = "cd ~/.local/share/Trash", desc = "跳转到回收站" },
	{ on = [ "g", "p" ],       run = "cd ~/Pictures", desc = "跳转到图片目录" },
	{ on = [ "g", "v" ],       run = "cd ~/Videos", desc = "跳转到视频目录" },
	{ on = [ "g", "f" ],       run = "cd ~/Documents", desc = "跳转到文档目录" },
  { on = [ "g", "c" ],       run = "cd ~/.config", desc = "跳转到.config目录" },
  { on = [ "g", "l" ],       run = "cd ~/.local", desc = "跳转到.local目录" },

	# Help
	{ on = [ "?" ], run = "help", desc = "打开帮助" },
]
keymap = [
	{ on = "<Esc>", run = "escape",             desc = "退出可视模式、清除选中或取消搜索" },
	{ on = "<C-[>", run = "escape",             desc = "退出可视模式、清除选中或取消搜索" },
	{ on = "q",     run = "quit",               desc = "退出进程" },
	{ on = "Q",     run = "quit --no-cwd-file", desc = "退出且不输出 cwd 文件" },
	{ on = "<C-c>", run = "close",              desc = "关闭当前标签页，若为最后一个则退出" },
	{ on = "<C-z>", run = "suspend",            desc = "挂起进程" },

	# Hopping
	{ on = "k", run = "arrow prev", desc = "上一个文件" },
	{ on = "j", run = "arrow next", desc = "下一个文件" },

	{ on = "<Up>",   run = "arrow prev", desc = "上一个文件" },
	{ on = "<Down>", run = "arrow next", desc = "下一个文件" },

	{ on = "<C-u>", run = "arrow -50%",  desc = "光标上移半页" },
	{ on = "<C-d>", run = "arrow 50%",   desc = "光标下移半页" },
	{ on = "<C-b>", run = "arrow -100%", desc = "光标上移一页" },
	{ on = "<C-f>", run = "arrow 100%",  desc = "光标下移一页" },

	{ on = "<S-PageUp>",   run = "arrow -50%",  desc = "光标上移半页" },
	{ on = "<S-PageDown>", run = "arrow 50%",   desc = "光标下移半页" },
	{ on = "<PageUp>",     run = "arrow -100%", desc = "光标上移一页" },
	{ on = "<PageDown>",   run = "arrow 100%",  desc = "光标下移一页" },

	{ on = [ "g", "g" ], run = "arrow top", desc = "跳转到顶部" },
	{ on = "G",          run = "arrow bot", desc = "跳转到底部" },

	# Navigation
	{ on = "h", run = "leave", desc = "返回上级目录" },
	{ on = "l", run = "enter", desc = "进入子目录" },

	{ on = "<Left>",  run = "leave", desc = "返回上级目录" },
	{ on = "<Right>", run = "enter", desc = "进入子目录" },

	{ on = "H", run = "back",    desc = "返回上一个目录" },
	{ on = "L", run = "forward", desc = "前进到下一个目录" },

	# Toggle
	{ on = "<Space>", run = [ "toggle", "arrow next" ], desc = "切换当前选中状态" },
	{ on = "<C-a>",   run = "toggle_all --state=on",    desc = "全选文件" },
	{ on = "<C-r>",   run = "toggle_all",               desc = "反向选择所有文件" },

	# Visual mode
	{ on = "v", run = "visual_mode",         desc = "进入可视模式（选择模式）" },
	{ on = "V", run = "visual_mode --unset", desc = "进入可视模式（取消模式）" },

	# Seeking
	{ on = "K", run = "seek -5", desc = "预览中向上滚动 5 单位" },
	{ on = "J", run = "seek 5",  desc = "预览中向下滚动 5 单位" },

	# Spotting
	{ on = "<Tab>", run = "spot", desc = "标记悬停文件" },

	# Operation
	{ on = "o",         run = "open",                        desc = "打开选中文件" },
	{ on = "O",         run = "open --interactive",          desc = "交互式打开选中文件" },
	# { on = "<Enter>",   run = "open",                        desc = "打开选中文件" },
	# { on = "<S-Enter>", run = "open --interactive",          desc = "交互式打开选中文件" },
	{ on = "y",         run = "yank",                        desc = "复制选中文件" },
	{ on = "x",         run = "yank --cut",                  desc = "剪切选中文件" },
	{ on = "p",         run = "paste",                       desc = "粘贴已复制/剪切的文件" },
	{ on = "P",         run = "paste --force",               desc = "粘贴文件（若目标存在则覆盖）" },
	{ on = "-",         run = "link",                        desc = "创建绝对路径的符号链接" },
	{ on = "_",         run = "link --relative",             desc = "创建相对路径的符号链接" },
	{ on = "<C-->",     run = "hardlink",                    desc = "创建硬链接" },
	{ on = "Y",         run = "unyank",                      desc = "取消复制/剪切状态" },
	{ on = "X",         run = "unyank",                      desc = "取消复制/剪切状态" },
	{ on = "d",         run = "remove",                      desc = "将选中文件移至回收站" },
	{ on = "D",         run = "remove --permanently",        desc = "永久删除选中文件" },
	{ on = "a",         run = "create",                      desc = "创建文件（以 / 结尾表示目录）" },
	{ on = "r",         run = "rename --cursor=before_ext",  desc = "重命名选中文件" },
	{ on = ";",         run = "shell --interactive",         desc = "运行 shell 命令" },
	{ on = ":",         run = "shell --block --interactive", desc = "运行 shell 命令（阻塞直到完成）" },
	{ on = ".",         run = "hidden toggle",               desc = "切换隐藏文件的可见性" },
	{ on = "s",         run = "search --via=fd",             desc = "通过 fd 按文件名搜索" },
	{ on = "S",         run = "search --via=rg",             desc = "通过 ripgrep 按内容搜索" },
	{ on = "<C-s>",     run = "escape --search",             desc = "取消正在进行的搜索" },
	{ on = "z",         run = "plugin fzf",                  desc = "通过 fzf 跳转到文件/目录" },
	{ on = "Z",         run = "plugin zoxide",               desc = "通过 zoxide 跳转到目录" },

	# Linemode
	{ on = [ "m", "s" ], run = "linemode size",        desc = "行模式：大小" },
	{ on = [ "m", "p" ], run = "linemode permissions", desc = "行模式：权限" },
	{ on = [ "m", "b" ], run = "linemode btime",       desc = "行模式：创建时间" },
	{ on = [ "m", "m" ], run = "linemode mtime",       desc = "行模式：修改时间" },
	{ on = [ "m", "o" ], run = "linemode owner",       desc = "行模式：所有者" },
	{ on = [ "m", "n" ], run = "linemode none",        desc = "行模式：无" },

	# Copy
	{ on = [ "c", "c" ], run = "copy path",             desc = "复制文件路径" },
	{ on = [ "c", "d" ], run = "copy dirname",          desc = "复制目录路径" },
	{ on = [ "c", "f" ], run = "copy filename",         desc = "复制文件名" },
	{ on = [ "c", "n" ], run = "copy name_without_ext", desc = "复制不含扩展名的文件名" },

	# Filter
	{ on = "f", run = "filter --smart", desc = "过滤文件" },

	# Find
	{ on = "/", run = "find --smart",            desc = "查找下一个文件" },
	{ on = "?", run = "find --previous --smart", desc = "查找上一个文件" },
	{ on = "n", run = "find_arrow",              desc = "跳转到下一个匹配项" },
	{ on = "N", run = "find_arrow --previous",   desc = "跳转到上一个匹配项" },

	# Sorting
	{ on = [ ",", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime" ], desc = "按修改时间排序" },
	{ on = [ ",", "M" ], run = [ "sort mtime --reverse", "linemode mtime" ],    desc = "按修改时间倒序排序" },
	{ on = [ ",", "b" ], run = [ "sort btime --reverse=no", "linemode btime" ], desc = "按创建时间排序" },
	{ on = [ ",", "B" ], run = [ "sort btime --reverse", "linemode btime" ],    desc = "按创建时间倒序排序" },
	{ on = [ ",", "e" ], run = "sort extension --reverse=no",                   desc = "按扩展名排序" },
	{ on = [ ",", "E" ], run = "sort extension --reverse",                      desc = "按扩展名倒序排序" },
	{ on = [ ",", "a" ], run = "sort alphabetical --reverse=no",                desc = "按字母顺序排序" },
	{ on = [ ",", "A" ], run = "sort alphabetical --reverse",                   desc = "按字母倒序排序" },
	{ on = [ ",", "n" ], run = "sort natural --reverse=no",                     desc = "按自然顺序排序" },
	{ on = [ ",", "N" ], run = "sort natural --reverse",                        desc = "按自然倒序排序" },
	{ on = [ ",", "s" ], run = [ "sort size --reverse=no", "linemode size" ],   desc = "按大小排序" },
	{ on = [ ",", "S" ], run = [ "sort size --reverse", "linemode size" ],      desc = "按大小倒序排序" },
	{ on = [ ",", "r" ], run = "sort random --reverse=no",                      desc = "随机排序" },

	# Goto
	{ on = [ "g", "h" ],       run = "cd ~",             desc = "跳转到家目录" },
	{ on = [ "g", "c" ],       run = "cd ~/.config",     desc = "跳转到 ~/.config" },
	{ on = [ "g", "d" ],       run = "cd ~/Downloads",   desc = "跳转到 ~/Downloads" },
	{ on = [ "g", "<Space>" ], run = "cd --interactive", desc = "交互式跳转" },
	{ on = [ "g", "f" ],       run = "follow",           desc = "跟随悬停的符号链接" },

	# Tabs
	{ on = "t", run = "tab_create --current", desc = "使用当前路径创建新标签页" },

	{ on = "1", run = "tab_switch 0", desc = "切换到第一个标签页" },
	{ on = "2", run = "tab_switch 1", desc = "切换到第二个标签页" },
	{ on = "3", run = "tab_switch 2", desc = "切换到第三个标签页" },
	{ on = "4", run = "tab_switch 3", desc = "切换到第四个标签页" },
	{ on = "5", run = "tab_switch 4", desc = "切换到第五个标签页" },
	{ on = "6", run = "tab_switch 5", desc = "切换到第六个标签页" },
	{ on = "7", run = "tab_switch 6", desc = "切换到第七个标签页" },
	{ on = "8", run = "tab_switch 7", desc = "切换到第八个标签页" },
	{ on = "9", run = "tab_switch 8", desc = "切换到第九个标签页" },

	{ on = "[", run = "tab_switch -1 --relative", desc = "切换到上一个标签页" },
	{ on = "]", run = "tab_switch 1 --relative",  desc = "切换到下一个标签页" },

	{ on = "{", run = "tab_swap -1", desc = "与上一个标签页交换位置" },
	{ on = "}", run = "tab_swap 1",  desc = "与下一个标签页交换位置" },

	# Tasks
	{ on = "w", run = "tasks:show", desc = "显示任务管理器" },

	# Help
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]

[tasks]

# 手动修改通过w打开的任务面板的键位
prepend_keymap = [
	{ on = [ "u" ], run = "arrow -1", desc = "光标上移" },
	{ on = [ "e" ], run = "arrow 1",  desc = "光标下移" },
	{ on = [ "i" ], run = "inspect", desc = "检查任务" },
	{ on = [ "?" ], run = "help", desc = "打开帮助" },
	{ on = [ "d" ],       run = "cancel",  desc = "取消任务" },
]

keymap = [
	{ on = "<Esc>", run = "close", desc = "关闭任务管理器" },
	{ on = "<C-[>", run = "close", desc = "关闭任务管理器" },
	{ on = "<C-c>", run = "close", desc = "关闭任务管理器" },
	{ on = "w",     run = "close", desc = "关闭任务管理器" },

	{ on = "k", run = "arrow prev", desc = "上一个任务" },
	{ on = "j", run = "arrow next", desc = "下一个任务" },

	{ on = "<Up>",   run = "arrow prev", desc = "上一个任务" },
	{ on = "<Down>", run = "arrow next", desc = "下一个任务" },

	# { on = "<Enter>", run = "inspect", desc = "检查任务" },
	{ on = "x",       run = "cancel",  desc = "取消任务" },

	# Help
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]

[spot]

prepend_keymap = [
	{ on = [ "u" ], run = "arrow -1", desc = "光标上移" },
	{ on = [ "e" ], run = "arrow 1",  desc = "光标下移" },
	{ on = [ "U" ], run = "arrow -5", desc = "光标上移 5 行" },
	{ on = [ "E" ], run = "arrow 5",  desc = "光标下移 5 行" },
	{ on = [ "n" ], run = "swipe -1", desc = "滑动到下一个文件" },
	{ on = [ "i" ], run = "swipe 1",  desc = "滑动到上一个文件" },
	{ on = [ "?" ], run = "help", desc = "打开帮助" }
]

keymap = [
	{ on = "<Esc>", run = "close", desc = "关闭 spot 面板" },
	{ on = "<C-[>", run = "close", desc = "关闭 spot 面板" },
	{ on = "<C-c>", run = "close", desc = "关闭 spot 面板" },
	{ on = "<Tab>", run = "close", desc = "关闭 spot 面板" },

	{ on = "k", run = "arrow prev", desc = "上一行" },
	{ on = "j", run = "arrow next", desc = "下一行" },
	{ on = "h", run = "swipe prev", desc = "滑动到上一个文件" },
	{ on = "l", run = "swipe next", desc = "滑动到下一个文件" },

	{ on = "<Up>",    run = "arrow prev", desc = "上一行" },
