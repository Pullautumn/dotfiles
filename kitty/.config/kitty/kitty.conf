# vim:ft=kitty

## name:     Catppuccin Kitty Mocha
## author:   Catppuccin Org
## license:  MIT
## upstream: https://github.com/catppuccin/kitty/blob/main/themes/mocha.conf
## blurb:    Soothing pastel theme for the high-spirited!

# 设置字体族和大小
# font_family Fira Code Regular
# font_family JetBrainsMono Nerd Font
font_family      JetBrainsMapleMono
bold_font        JetBrainsMapleMono-Bold
italic_font      JetBrainsMapleMono-Italic
bold_italic_font JetBrainsMapleMono-BoldItalic
# font_size 12.0
# 关闭连字特性
disable_ligatures always


# 如果你想使用连字特性（Fira Code 支持）
# symbol_map U+E0A0-U+E0A2,U+E0B0-U+E0B3 Symbola

enable_audio_bell no

# 窗口透明度设置
# 设置半透明背景
background_opacity 0.85
# 背景透明度设置为70%（0.7）
# background_opacity 0.7
# 动态背景透明度为70%（可能用于焦点切换时的效果）
# dynamic_background_opacity 0.7

# The basic colors
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# Cursor colors
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# URL underline color when hovering with mouse
url_color               #f5e0dc

# Kitty window border colors
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# Colors for marks (marked text in the terminal)
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

# The 16 terminal colors

# black
color0 #45475a
color8 #585b70

# red
color1 #f38ba8
color9 #f38ba8

# green
color2  #a6e3a1
color10 #a6e3a1

# yellow
color3  #f9e2af
color11 #f9e2af

# blue
color4  #89b4fa
color12 #89b4fa

# magenta
color5  #f5c2e7
color13 #f5c2e7

# cyan
color6  #94e2d5
color14 #94e2d5

# white
color7  #bac2de
color15 #a6adc8


# 窗口外观设置
# 窗口内边距设置为4像素（文本与窗口边缘的距离）
window_padding_width  2

# 启用远程控制功能
allow_remote_control yes
# 监听指令的套接字
listen_on unix:/tmp/kitty-$USER

# 启用shell集成功能，提供更好的终端交互体验（如显示命令状态）
shell_integration enabled

# 默认布局仅为垂直分割
enabled_layouts splits

enable_audio_bell no

# 滚动和历史配置
# 滚动回看缓冲区行数设置为20万行（历史命令保存量）
scrollback_lines 200000
# 鼠标滚轮最小滚动行数为1行（精确滚动）
wheel_scroll_min_lines 1

# 光标动画
cursor_trail 3

# —— 中键 = 复制选区到系统剪贴板 ——
# 用 press 事件可即时触发；同时把 release 事件置空，避免触发 kitty 的默认“中键释放=粘贴主选区”
mouse_map middle press   grabbed,ungrabbed copy_to_clipboard
mouse_map middle release grabbed,ungrabbed

# —— 右键 = 从系统剪贴板粘贴 ——
# 同样用 press，保证立刻粘贴；覆盖 grabbed / ungrabbed 两种模式
# mouse_map right  press   grabbed,ungrabbed paste_from_clipboard

# ----------- 标签页 -----------
map alt+shift+t  new_tab_with_cwd !neighbor
map alt+shift+bracketleft  previous_tab
map alt+shift+bracketright next_tab
map alt+shift+q  close_tab
map alt+shift+r set_tab_title
map alt+shift+left  move_tab_backward
map alt+shift+right move_tab_forward

# ----------- 分屏 -----------
# 上下
map ctrl+shift+j launch --location=hsplit
# 左右
map ctrl+shift+k launch --location=vsplit
# 仅关闭当前分屏
map ctrl+shift+q       close_window

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9


# 进入选中模式的快捷键（可选，但推荐）
map ctrl+shift+space enter_selection_mode

# 在选中模式下，Shift+方向键扩展选区
map selection shift+left  expand_selection word left
map selection shift+right expand_selection word right
map selection shift+up    expand_selection line up
map selection shift+down  expand_selection line down

map shift+enter send_text all \e\r
